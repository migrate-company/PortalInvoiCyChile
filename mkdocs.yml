use_directory_urls: false

theme:
  name: material
  font: false
  language: es
  direction: ltr
  logo: assets/img/logo-invoicy-for-devs.svg
  custom_dir: overrides
  favicon: assets/img/favicon.png
  palette:
    primary: custom
  icon:
    annotation: material/plus-circle
    repo: fontawesome/brands/git-alt
  features:
    - navigation.indexes
    - navigation.top
    - content.code.copy
    - content.code.annotate

extra:
  old_site_url: https://desenvolvedores-antigo.migrate.info/
  footer_logo: ./assets/img/logo_azul.svg
  country_flags:
    br: ./assets/img/flags/br.svg
    ar: ./assets/img/flags/ar.svg
    py: ./assets/img/flags/py.svg
    uy: ./assets/img/flags/uy.svg

extra_css:
  - assets/stylesheets/components.css
  - assets/stylesheets/utilities.css
  - assets/stylesheets/extra.css
  - assets/stylesheets/breakpoints.css
  - assets/stylesheets/mkdocs-plugin/neoteroi.css
  - assets/stylesheets/annotations.css

extra_javascript:
  - assets/javascripts/annotations.js
  - assets/javascripts/links_nova_guia.js
  - assets/javascripts/flexsearch.bundle.js
  - assets/javascripts/toggle-footer-position.js
  - assets/javascripts/return-to-page.js
  - assets/javascripts/search-dedicated.js

watch:
  - overrides

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.highlight:
      anchor_linenums: true
      linenums: true
      # css_class: 'highlight'
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - pymdownx.keys
  - neoteroi.timeline
