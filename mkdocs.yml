site_name: Portal de Integración – InvoiCy Chile
site_url: https://migrate-company.github.io/PortalInvoiCyChile
repo_url: https://github.com/migrate-company/PortalInvoiCyChile/tree/main/docs/Ejemplos/
repo_name: Ejemplos de integración
copyright: "Todos los derechos reservados"

nav:
  - Início: index.md
  - Digitación:
    - InvoiCy Digitación en Pantalla: Digitacion/Digitacion.md
  - Integración:
    - API REST: Integracion/Integracion_API_REST.md
  - Downloads: Downloads/Downloads.md
  - InvoiCy Core:
    - OCR Internacional: InvoiCy_Core/InvoiCy_OCR_Internacional.md
  - Release Notes: Revisiones/Release Notes.md
  - FAQ: FAQ.md

#Fim definição de MENU

plugins:
  - search:
      lang: es
  - git-authors:
      enabled: true
      show_contribution: true
      show_email_address: true
      add_co_authors: true
      sort_authors_by: contribution
      #authorship_threshold_percent: 10
      enabled_on_serve: true
      exclude:
        - index.md
        - ES\Invoicy\news\index.md
  - glightbox:
      touchNavigation: true
      effect: zoom
      zoomable: true
  - git-revision-date-localized:
      enabled: true
      locale: es
      type: date
      exclude:
        - index.md
        - ES\Invoicy\news\index.md
        # - about.md

