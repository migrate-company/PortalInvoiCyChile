<header class="md-header" data-md-component="header">
  <nav class="md-header__inner md-grid" aria-label="Cabeçalho">
    <a
      href="{{config.site_url}}"
      title="{{config.site_name}}"
      class="md-header__button md-logo"
      aria-label="{{config.site_name}}"
      data-md-component="logo"
    >
      <img src="{{config.theme.logo | url}}" alt="logo" />
    </a>

    <div class="flex items-center">
      <div class="md-header__buttons">

        <div class="modal-overlay" id="modalOverlay">
          <div class="modal" id="modal">
            <div class="search-input-wrapper">
              <svg
                viewBox="0 0 16 16"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <path
                  d="M15.7358 14.9796L12.2223 11.4646C13.2758 10.0918 13.7676 8.36967 13.598 6.64758C13.4285 4.92548 12.6102 3.33237 11.3092 2.1914C10.0083 1.05043 8.32198 0.447048 6.59249 0.503651C4.863 0.560253 3.21979 1.2726 1.99619 2.49619C0.772602 3.71978 0.0602528 5.36299 0.0036505 7.09249C-0.0529518 8.82198 0.550431 10.5083 1.6914 11.8092C2.83237 13.1102 4.42548 13.9285 6.14758 14.098C7.86967 14.2676 9.59178 13.7758 10.9646 12.7223L14.481 16.2395C14.5636 16.3221 14.6617 16.3876 14.7696 16.4323C14.8775 16.477 14.9931 16.5 15.1099 16.5C15.2267 16.5 15.3424 16.477 15.4503 16.4323C15.5582 16.3876 15.6562 16.3221 15.7388 16.2395C15.8214 16.1569 15.8869 16.0589 15.9316 15.951C15.9763 15.8431 15.9993 15.7274 15.9993 15.6106C15.9993 15.4939 15.9763 15.3782 15.9316 15.2703C15.8869 15.1624 15.8214 15.0644 15.7388 14.9818L15.7358 14.9796ZM1.79055 7.32147C1.79055 6.32645 2.0856 5.35377 2.63841 4.52644C3.19121 3.69911 3.97694 3.05428 4.89622 2.6735C5.8155 2.29272 6.82705 2.19309 7.80295 2.38721C8.77886 2.58133 9.67528 3.06048 10.3789 3.76407C11.0825 4.46766 11.5616 5.36408 11.7557 6.33998C11.9498 7.31589 11.8502 8.32744 11.4694 9.24672C11.0887 10.166 10.4438 10.9517 9.6165 11.5045C8.78917 12.0573 7.81649 12.3524 6.82147 12.3524C5.48761 12.351 4.20877 11.8205 3.26558 10.8774C2.3224 9.93417 1.79192 8.65533 1.79055 7.32147Z"
                ></path>
              </svg>

              <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Escribe para buscar..."
                autocomplete="off"
              />
            </div>

            <div class="results" id="results">
              <div class="empty-state">Escribe algo para comenzar a buscar</div>
            </div>

            <div class="modal-footer">
              <span class="results-count" id="resultsCount"></span>
              <div class="footer-hint">
                <span class="key">Esc</span>
                <span>para cerrar</span>
              </div>
            </div>
          </div>
        </div>

        <a
          href="https://webuy.migrate.info/InvoiCy/hnuc001.aspx"
          target="_blank"
          rel="noopener noreferrer"
          class="button button-primary hidden-mobile"
          onclick="
            window.open(
              'https://webuy.migrate.info/InvoiCy/hnuc001.aspx',
              '_blank',
              'noopener,noreferrer',
            )
            return false
          "
        >
          Acceder a InvoiCy
        </a>

        <div class="separator vertical" style="height: 2.1875rem"></div>

        <label
          class="md-header__button md-icon button button-secondary"
          for="__drawer"
        >
          <svg
            width="24"
            height="16"
            viewBox="0 0 24 16"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M1.33334 16C0.95556 16 0.639116 15.872 0.384005 15.616C0.128894 15.36 0.000893486 15.0435 4.59769e-06 14.6666C-0.000884291 14.2898 0.127116 13.9733 0.384005 13.7173C0.640893 13.4613 0.957338 13.3333 1.33334 13.3333H22.6667C23.0444 13.3333 23.3613 13.4613 23.6173 13.7173C23.8733 13.9733 24.0009 14.2898 24 14.6666C23.9991 15.0435 23.8711 15.3604 23.616 15.6173C23.3609 15.8742 23.0444 16.0018 22.6667 16H1.33334ZM1.33334 9.33332C0.95556 9.33332 0.639116 9.20532 0.384005 8.94932C0.128894 8.69332 0.000893486 8.37688 4.59769e-06 7.99999C-0.000884291 7.6231 0.127116 7.30666 0.384005 7.05066C0.640893 6.79466 0.957338 6.66666 1.33334 6.66666H22.6667C23.0444 6.66666 23.3613 6.79466 23.6173 7.05066C23.8733 7.30666 24.0009 7.6231 24 7.99999C23.9991 8.37688 23.8711 8.69377 23.616 8.95066C23.3609 9.20755 23.0444 9.3351 22.6667 9.33332H1.33334ZM1.33334 2.66666C0.95556 2.66666 0.639116 2.53866 0.384005 2.28266C0.128894 2.02666 0.000893486 1.71022 4.59769e-06 1.33333C-0.000884291 0.956443 0.127116 0.639999 0.384005 0.384C0.640893 0.128 0.957338 0 1.33334 0H22.6667C23.0444 0 23.3613 0.128 23.6173 0.384C23.8733 0.639999 24.0009 0.956443 24 1.33333C23.9991 1.71022 23.8711 2.02711 23.616 2.284C23.3609 2.54089 23.0444 2.66844 22.6667 2.66666H1.33334Z"
            />
          </svg>
        </label>

        <div class="md-header__countries">
          <a
            href="https://desenvolvedores.migrate.info/"
            target="_blank"
            rel="noopener"
          >
            <img src="{{config.extra.country_flags.br | url}}" alt="br" />
          </a>

          <a
            href="https://migrate-company.github.io/PortalInvoiCyArgentina/"
            target="_blank"
            rel="noopener"
          >
            <img src="{{config.extra.country_flags.ar | url}}" alt="ar" />
          </a>

          <a
            href="https://migrate-company.github.io/PortalInvoICyParaguay/"
            target="_blank"
            rel="noopener"
          >
            <img src="{{config.extra.country_flags.py | url}}" alt="py" />
          </a>

          <a
            href="{{config.site_url}}"
            target="_self"
            rel="noopener"
            class="active"
          >
            <img src="{{config.extra.country_flags.uy | url}}" alt="uy" />
          </a>
        </div>
      </div>
    </div>
  </nav>
</header>
